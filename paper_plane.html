<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income Lab | 수익화의 모든 것</title>
    <style>
        body { background: #fdfdfd; color: #1a1a1a; font-family: 'Pretendard', sans-serif; margin: 0; padding: 0; line-height: 1.6; }
        header { padding: 60px 20px; text-align: center; border-bottom: 1px solid #eee; }
        h1 { font-size: 2.5rem; letter-spacing: -1px; margin-bottom: 10px; }
        .grid { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .post { background: white; padding: 40px; border-radius: 20px; border: 1px solid #f0f0f0; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .label { color: #2563eb; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 10px; display: block; }
        h2 { margin-top: 0; }
        .btn { display: inline-block; margin-top: 20px; padding: 12px 24px; background: #1a1a1a; color: white; border-radius: 8px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <header>
        <h1>Income Lab</h1>
        <p style="color: #666;">검증된 수익화 전략만을 기록합니다.</p>
    </header>
    <div class="grid">
        <div class="post">
            <span class="label">Side Hustle</span>
            <h2>AI로 30분 만에 수익형 전자책 만들기</h2>
            <p>직접 실험한 0원 창업 루틴. 누구나 따라 할 수 있는 프롬프트와 플랫폼 전략을 공개합니다.</p>
            <a href="#" class="btn">전략 리포트 보기</a>
        </div>
        <div class="post">
            <span class="label">Passive Income</span>
            <h2>자동화 웹사이트로 제휴 마케팅 수익 내기</h2>
            <p>코드 한 줄로 쿠팡 파트너스를 자동화하는 방법. 실패 없는 키워드 선정 팁 포함.</p>
            <a href="#" class="btn">실행 가이드 보기</a>
        </div>
    </div>
</body>
</html>
